<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080b16">
  <title>Захват арены</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="game-shell">
    <div class="game-layout">
    <aside class="hud" aria-label="Состояние игрока">
      <div class="brand">ROOM // <span id="arena-number">01</span></div>
      <div class="meter-group">
        <label>Корпус <progress id="health" max="100" value="100"></progress></label>
        <label>Щит <progress id="shield" max="100" value="100"></progress></label>
        <span id="armor" title="Целые грани брони">Броня: 8/8</span>
        <div id="armor-cells" class="armor-cells" aria-label="Энергоячейки сегментов брони"></div>
        <span id="score">Очки: 0</span>
      </div>
      <div id="status" class="status">Найдите точку захвата</div>
      <div class="minimap-panel" aria-label="Пройденный путь">
        <span>МАРШРУТ</span>
        <canvas id="minimap" width="220" height="220"></canvas>
      </div>
    </aside>

    <section class="viewport" aria-label="Игровая арена">
      <canvas id="game" width="960" height="600"></canvas>
      <div id="message" class="message" aria-live="polite"></div>
      <button id="restart" class="restart" type="button" hidden>Новый забег</button>
      <section id="shop" class="shop" aria-label="Магазин улучшений" hidden>
        <div class="shop-header">
          <div><span id="shop-kicker" class="shop-kicker">МЕЖДУ АРЕНАМИ</span><h2 id="shop-title">Магазин улучшений</h2></div>
          <strong id="shop-score">0 очков</strong>
        </div>
        <div id="shop-cards" class="shop-cards"></div>
        <div class="shop-actions">
          <button id="reroll" type="button">Рерол · 20</button>
          <button id="shop-continue" type="button">Продолжить без покупки</button>
        </div>
      </section>
    </section>
    </div>

    <section class="mobile-controls" aria-label="Сенсорное управление">
      <div class="dpad">
        <button data-direction="up" aria-label="Вверх">▲</button>
        <button data-direction="left" aria-label="Влево">◀</button>
        <button data-direction="down" aria-label="Вниз">▼</button>
        <button data-direction="right" aria-label="Вправо">▶</button>
      </div>
      <div class="action-buttons">
        <button id="ability-button" class="ability-button" type="button">МОДУЛЬ</button>
        <button id="attack-button" class="attack-button" type="button">МЕЧ</button>
        <button id="shield-button" class="shield-button" type="button">ЩИТ</button>
      </div>
    </section>

    <footer class="help">
      <span>WASD / стрелки — движение</span>
      <span>Мышь — направление взгляда</span>
      <span>F / ЛКМ — удар мечом</span>
      <span>Пробел / ПКМ — активировать щит</span>
      <span>E — способность модуля</span>
    </footer>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
